<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Live Translation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0a0a0f; --surface: #13131a; --border: #2a2a3a;
    --accent: #7c6af7; --text: #e8e8f0; --muted: #6b6b80; --green: #22c55e;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 2rem 1.25rem;
  }
  .logo { font-size: 3rem; margin-bottom: 1rem; }
  h1 { font-size: 1.6rem; font-weight: 800; text-align: center; letter-spacing: -0.02em; margin-bottom: 0.5rem; }
  h1 span { color: var(--accent); }
  .subtitle { font-size: 0.9rem; color: var(--muted); text-align: center; margin-bottom: 2.5rem; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    background: rgba(34,197,94,0.15); border: 1px solid rgba(34,197,94,0.3);
    color: var(--green); border-radius: 99px;
    padding: 0.3rem 0.8rem; font-size: 0.75rem; font-weight: 600;
    margin-bottom: 2rem;
  }
  .dot-live { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: pulse 1.4s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
  .lang-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.75rem;
    width: 100%;
    max-width: 360px;
  }
  .lang-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 1.25rem 1rem;
    text-align: center;
    cursor: pointer;
    text-decoration: none;
    color: var(--text);
    transition: border-color 0.2s, background 0.2s;
    display: flex; flex-direction: column;
    align-items: center; gap: 0.4rem;
  }
  .lang-btn:hover, .lang-btn:active {
    border-color: var(--accent);
    background: rgba(124,106,247,0.08);
  }
  .lang-native { font-size: 1.3rem; font-weight: 700; }
  .lang-english { font-size: 0.75rem; color: var(--muted); font-weight: 600; letter-spacing: 0.05em; }
  .footer { margin-top: 2.5rem; font-size: 0.75rem; color: var(--muted); text-align: center; line-height: 1.6; }
</style>
</head>
<body>

<div class="logo">🎙</div>
<h1>Live <span>Translation</span></h1>
<p class="subtitle">Select your language to listen live</p>

<div class="live-badge">
  <div class="dot-live"></div>
  Service in progress
</div>

<div class="lang-grid" id="lang-grid">
  <!-- Populated by JS -->
</div>

<div class="footer">
  Make sure you are connected to church WiFi<br>
  Turn your volume up before tapping
</div>

<script>
// Languages available — add or remove as needed
const LANGUAGES = [
  { path: "urdu",   native: "اردو",    english: "Urdu" },
  { path: "nepali", native: "नेपाली", english: "Nepali" },
];

const grid = document.getElementById('lang-grid');
LANGUAGES.forEach(lang => {
  const a = document.createElement('a');
  a.className = 'lang-btn';
  a.href = '/' + lang.path;
  a.innerHTML =
    '<div class="lang-native">' + lang.native + '</div>' +
    '<div class="lang-english">' + lang.english + '</div>';
  grid.appendChild(a);
});
</script>
</body>
</html>
